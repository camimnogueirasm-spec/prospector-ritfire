name: AI Prospector Ritfire
on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  prospectar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Rodar Prospector
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python prospector.py

      - name: Commit data.json atualizado
        run: |
          git config user.name "AI Prospector Bot"
          git config user.email "bot@ritfire.com"
          git add data.json
          git diff --staged --quiet || git commit -m "🤖 Oportunidades atualizadas $(date '+%d/%m/%Y %H:%M')"
          git push
