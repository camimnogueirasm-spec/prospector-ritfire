<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ritfire — AI Prospector</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap');
:root{--bg:#0a0a0f;--surface:#111118;--card:#16161f;--border:#2a2a3d;--fire:#ff4d00;--fire2:#ff9500;--blue:#1976d2;--blue2:#42a5f5;--green:#00e676;--text:#e8e8f0;--muted:#6b6b8a;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(255,77,0,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,77,0,0.02) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
.login-overlay{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;align-items:center;justify-content:center;}
.login-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px;width:100%;max-width:380px;text-align:center;}
.login-logo{width:56px;height:56px;background:linear-gradient(135deg,var(--fire),var(--fire2));border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 20px;}
.login-title{font-size:22px;font-weight:800;margin-bottom:4px;}
.login-sub{font-size:13px;color:var(--muted);margin-bottom:28px;}
.login-field{display:flex;flex-direction:column;gap:7px;margin-bottom:16px;text-align:left;}
.login-field label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);}
.login-field input{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 14px;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;outline:none;transition:border-color 0.2s;width:100%;}
.login-field input:focus{border-color:var(--fire);}
.login-btn{width:100%;background:linear-gradient(135deg,var(--fire),var(--fire2));color:white;border:none;border-radius:10px;padding:14px;font-family:'Syne',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:opacity 0.2s;margin-top:4px;}
.login-btn:hover{opacity:0.88;}
.login-error{color:#ef9a9a;font-size:13px;margin-top:10px;min-height:18px;}
nav{position:sticky;top:0;z-index:100;background:rgba(10,10,15,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px;}
.nav-logo{display:flex;align-items:center;gap:10px;font-weight:800;font-size:18px;}
.nav-logo .icon{width:32px;height:32px;background:linear-gradient(135deg,var(--fire),var(--fire2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;}
.nav-right{display:flex;align-items:center;gap:12px;}
.last-update{font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);}
.btn-update{display:flex;align-items:center;gap:6px;background:linear-gradient(135deg,var(--fire),var(--fire2));color:white;border:none;border-radius:8px;padding:8px 16px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:opacity 0.2s;}
.btn-update:hover{opacity:0.85;}.btn-update:disabled{opacity:0.4;cursor:not-allowed;}
.main{max-width:1060px;margin:0 auto;padding:24px 20px 60px;position:relative;z-index:1;}
.config-panel{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px 20px;margin-bottom:20px;}
.config-title{font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--fire);margin-bottom:14px;}
.cfg-field{display:flex;flex-direction:column;gap:6px;}
.cfg-field label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);}
.cfg-field input{background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:10px 12px;color:var(--text);font-family:'Syne',sans-serif;font-size:13px;outline:none;transition:border-color 0.2s;max-width:300px;}
.cfg-field input:focus{border-color:var(--fire);}
.stats-row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:20px;}
@media(max-width:600px){.stats-row{grid-template-columns:repeat(3,1fr);}}
.stat{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center;}
.stat-n{font-size:24px;font-weight:800;}.stat-l{font-size:10px;color:var(--muted);font-family:'Space Mono',monospace;margin-top:2px;}
.nichos{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;}
.nicho-tab{display:flex;align-items:center;gap:8px;padding:10px 18px;border-radius:10px;border:1px solid var(--border);background:var(--card);font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all 0.2s;color:var(--muted);}
.nicho-tab.active-fire{background:rgba(255,77,0,0.12);border-color:var(--fire);color:var(--fire2);}
.nicho-tab.active-termo{background:rgba(25,118,210,0.12);border-color:var(--blue);color:var(--blue2);}
.nicho-tab .cnt{background:var(--border);color:var(--text);border-radius:20px;padding:2px 8px;font-size:11px;font-family:'Space Mono',monospace;}
.nicho-tab.active-fire .cnt{background:var(--fire);}.nicho-tab.active-termo .cnt{background:var(--blue);}
.cenario{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:13px 16px;margin-bottom:18px;font-size:13px;color:#c0c0d8;line-height:1.6;display:none;}
.cenario.visible{display:block;}.cenario strong{color:var(--fire2);}
.cards-area{display:none;}.cards-area.visible{display:block;}
.porte-section{margin-bottom:28px;}
.porte-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.porte-title{font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);}
.porte-count{font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);background:var(--surface);padding:2px 8px;border-radius:10px;}
.op-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:12px;transition:border-color 0.2s;animation:up 0.3s ease forwards;opacity:0;border-left:4px solid var(--fire);}
.op-card.termico{border-left-color:var(--blue);}
@keyframes up{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.op-card:hover{border-color:rgba(255,77,0,0.3);}.op-card.termico:hover{border-color:rgba(25,118,210,0.3);}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:8px;flex-wrap:wrap;}
.card-title{font-size:15px;font-weight:700;flex:1;line-height:1.3;}
.badges{display:flex;gap:5px;flex-wrap:wrap;}
.badge{padding:3px 8px;border-radius:20px;font-size:10px;font-weight:700;font-family:'Space Mono',monospace;text-transform:uppercase;white-space:nowrap;}
.b-fire{background:rgba(255,77,0,0.12);color:var(--fire2);border:1px solid rgba(255,77,0,0.2);}
.b-termo{background:rgba(25,118,210,0.12);color:var(--blue2);border:1px solid rgba(25,118,210,0.2);}
.b-alta{background:rgba(229,57,53,0.15);color:#ef9a9a;border:1px solid rgba(229,57,53,0.2);}
.b-media{background:rgba(255,149,0,0.12);color:var(--fire2);border:1px solid rgba(255,149,0,0.2);}
.b-baixa{background:rgba(0,230,118,0.08);color:var(--green);border:1px solid rgba(0,230,118,0.18);}
.b-ok{background:rgba(0,200,83,0.1);color:#69f0ae;border:1px solid rgba(0,200,83,0.2);}
.b-grande{background:rgba(255,77,0,0.08);color:#ffab91;border:1px solid rgba(255,77,0,0.15);}
.b-media-emp{background:rgba(255,193,7,0.08);color:#ffd54f;border:1px solid rgba(255,193,7,0.15);}
.b-pequena{background:rgba(76,175,80,0.08);color:#a5d6a7;border:1px solid rgba(76,175,80,0.15);}
.emp-linha{font-size:13px;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.emp-linha strong{color:var(--text);}
.card-desc{font-size:13px;color:#b0b0c8;line-height:1.6;margin-bottom:12px;}
.card-meta{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:12px;}
.meta-i{font-size:11px;color:var(--muted);font-family:'Space Mono',monospace;display:flex;align-items:center;gap:4px;}
.meta-i strong{color:var(--text);}
.contatos-box{background:#0d0d18;border:1px solid #1e1e35;border-radius:8px;padding:13px;margin-bottom:12px;}
.contatos-title{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
.contato-item{display:flex;align-items:center;gap:8px;font-size:13px;margin-bottom:6px;}
.contato-label{color:var(--muted);min-width:72px;font-size:12px;}
.contato-val{color:var(--text);font-weight:600;}
.contato-val a{color:var(--fire2);text-decoration:none;}.contato-val a:hover{text-decoration:underline;}
.wa-link{color:#25d366 !important;}
.no-contato{font-size:12px;color:var(--muted);font-style:italic;}
.btn-buscar{display:inline-flex;align-items:center;gap:5px;background:rgba(255,77,0,0.1);border:1px solid rgba(255,77,0,0.2);color:var(--fire2);border-radius:6px;padding:5px 11px;font-size:11px;font-weight:700;cursor:pointer;transition:all 0.2s;margin-top:6px;font-family:'Syne',sans-serif;}
.btn-buscar:hover{background:rgba(255,77,0,0.2);}
.abordagem{border-left:3px solid var(--fire);padding:10px 14px;border-radius:0 8px 8px 0;background:rgba(255,77,0,0.04);}
.op-card.termico .abordagem{border-left-color:var(--blue);}
.abordagem-title{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--fire2);margin-bottom:5px;}
.op-card.termico .abordagem-title{color:var(--blue2);}
.abordagem p{font-size:13px;color:#c0b090;line-height:1.5;}
.loading-overlay{display:none;position:fixed;inset:0;background:rgba(10,10,15,0.92);z-index:200;flex-direction:column;align-items:center;justify-content:center;gap:14px;}
.loading-overlay.visible{display:flex;}
.spinner{width:48px;height:48px;border:3px solid var(--border);border-top-color:var(--fire);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-size:14px;color:var(--muted);}
.loading-step{font-family:'Space Mono',monospace;font-size:12px;color:var(--fire);min-height:18px;}
.loading-prog{width:280px;height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.loading-prog-fill{height:100%;background:linear-gradient(90deg,var(--fire),var(--fire2));border-radius:2px;transition:width 0.5s ease;width:0%;}
.empty{text-align:center;padding:56px 20px;color:var(--muted);}
.empty .ico{font-size:44px;margin-bottom:12px;opacity:0.3;}
.empty p{font-size:14px;}
.error-box{background:rgba(229,57,53,0.08);border:1px solid rgba(229,57,53,0.2);border-radius:10px;padding:14px;color:#ef9a9a;font-size:13px;line-height:1.6;margin-bottom:18px;display:none;}
.error-box.visible{display:block;}
</style>
</head>
<body>

<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <div class="login-logo">&#9889;</div>
    <div class="login-title">RITFIRE</div>
    <div class="login-sub">AI Prospector &mdash; Acesso Restrito</div>
    <div class="login-field">
      <label>Senha de Acesso</label>
      <input type="password" id="loginSenha" placeholder="Digite a senha...">
    </div>
    <button class="login-btn" id="loginBtn">&#128272; ENTRAR</button>
    <div class="login-error" id="loginErro"></div>
  </div>
</div>

<nav>
  <div class="nav-logo">
    <div class="icon">&#9889;</div>
    <span>RITFIRE</span>
    <span style="color:var(--muted);font-weight:400;font-size:14px;margin-left:4px;">| AI Prospector</span>
  </div>
  <div class="nav-right">
    <span class="last-update" id="lastUpdate">Nunca atualizado</span>
    <button class="btn-update" id="btnUpdate">&#8635; ATUALIZAR</button>
  </div>
</nav>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text">Varrendo o mercado com IA...</div>
  <div class="loading-step" id="loadingStep">Iniciando...</div>
  <div class="loading-prog"><div class="loading-prog-fill" id="progFill"></div></div>
</div>

<div class="main">
  <div class="config-panel">
    <div class="config-title">&#9881; Configuracao</div>
    <div class="cfg-field">
      <label>Regiao de Busca</label>
      <input type="text" id="regiao" value="Brasil" placeholder="Ex: Brasil, Sao Paulo...">
    </div>
  </div>
  <div class="error-box" id="errorBox"></div>
  <div class="stats-row" id="statsRow" style="display:none">
    <div class="stat"><div class="stat-n" id="sTotal" style="color:var(--text)">0</div><div class="stat-l">TOTAL</div></div>
    <div class="stat"><div class="stat-n" id="sFire" style="color:var(--fire)">0</div><div class="stat-l">INCENDIO</div></div>
    <div class="stat"><div class="stat-n" id="sTermo" style="color:var(--blue2)">0</div><div class="stat-l">TERMICO</div></div>
    <div class="stat"><div class="stat-n" id="sAlta" style="color:#ef9a9a">0</div><div class="stat-l">URGENTE</div></div>
    <div class="stat"><div class="stat-n" id="sContatos" style="color:var(--green)">0</div><div class="stat-l">COM CONTATO</div></div>
  </div>
  <div class="nichos" id="nichosBar" style="display:none">
    <button class="nicho-tab active-fire" id="tabFire">&#128293; Protecao contra Incendio <span class="cnt" id="cntFire">0</span></button>
    <button class="nicho-tab" id="tabTermo">&#127777; Isolamento Termico <span class="cnt" id="cntTermo">0</span></button>
  </div>
  <div class="cenario" id="cenarioFire"></div>
  <div class="cenario" id="cenarioTermo"></div>
  <div class="cards-area" id="cardsIncendio"></div>
  <div class="cards-area" id="cardsTermico"></div>
  <div class="empty" id="emptyState">
    <div class="ico">&#127919;</div>
    <p>Clique em <strong>Atualizar</strong> para buscar oportunidades</p>
  </div>
</div>

<script>
var allData = { incendio: [], termico: [] };
var nichoAtivo = 'incendio';
var SENHA = 'Ritfire2026';

// LOGIN
document.getElementById('loginBtn').addEventListener('click', fazerLogin);
document.getElementById('loginSenha').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') fazerLogin();
});

function fazerLogin() {
  var senha = document.getElementById('loginSenha').value;
  if (senha === SENHA) {
    document.getElementById('loginOverlay').style.display = 'none';
    sessionStorage.setItem('ritfire_auth', '1');
  } else {
    document.getElementById('loginErro').textContent = 'Senha incorreta. Tente novamente.';
    document.getElementById('loginSenha').value = '';
    document.getElementById('loginSenha').focus();
  }
}

if (sessionStorage.getItem('ritfire_auth') === '1') {
  document.getElementById('loginOverlay').style.display = 'none';
}

// TABS
document.getElementById('tabFire').addEventListener('click', function() { switchNicho('incendio'); });
document.getElementById('tabTermo').addEventListener('click', function() { switchNicho('termico'); });
document.getElementById('btnUpdate').addEventListener('click', buscar);

var steps = [
  'Buscando oportunidades de incendio...',
  'Buscando grandes empresas...',
  'Buscando medias e pequenas empresas...',
  'Buscando isolamento termico...',
  'Consultando CNPJ.ws...',
  'Finalizando relatorio...'
];

function setProgress(pct) { document.getElementById('progFill').style.width = pct + '%'; }

async function buscar() {
  var regiao = document.getElementById('regiao').value.trim() || 'Brasil';
  var btn = document.getElementById('btnUpdate');
  btn.disabled = true; btn.textContent = 'Buscando...';
  document.getElementById('loadingOverlay').classList.add('visible');
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('errorBox').classList.remove('visible');
  document.getElementById('statsRow').style.display = 'none';
  document.getElementById('nichosBar').style.display = 'none';

  var si = 0; setProgress(5);
  var iv = setInterval(function() {
    var el = document.getElementById('loadingStep');
    if (el && si < steps.length) { el.textContent = steps[si]; setProgress(10 + (si / steps.length) * 70); si++; }
  }, 1200);

  try {
    var resI = await chamarAPI('incendio', regiao);
    setProgress(50);
    var resT = await chamarAPI('termico', regiao);
    setProgress(75);

    var ops = (resI.oportunidades || []).concat(resT.oportunidades || []);

    document.getElementById('loadingStep').textContent = 'Buscando contatos via CNPJ.ws...';
    for (var i = 0; i < ops.length; i++) {
      if (ops[i].cnpj) {
        var dados = await buscarCNPJ(ops[i].cnpj);
        if (dados) {
          if (dados.email) ops[i].contato_email = dados.email;
          if (dados.telefone) ops[i].contato_telefone = dados.telefone;
          ops[i].cnpj_validado = true;
        }
      }
    }
    setProgress(95);

    allData.incendio = ops.filter(function(o) { return o.nicho === 'incendio'; });
    allData.termico = ops.filter(function(o) { return o.nicho === 'termico'; });
    clearInterval(iv); setProgress(100);
    renderStats(ops, resI, resT);
    renderCards();
    document.getElementById('lastUpdate').textContent = 'Atualizado: ' + new Date().toLocaleString('pt-BR');
  } catch(err) {
    clearInterval(iv);
    document.getElementById('errorBox').textContent = 'Erro: ' + err.message;
    document.getElementById('errorBox').classList.add('visible');
    document.getElementById('emptyState').style.display = 'block';
  } finally {
    document.getElementById('loadingOverlay').classList.remove('visible');
    btn.disabled = false; btn.textContent = 'Atualizar'; setProgress(0);
  }
}

async function chamarAPI(nicho, regiao) {
  var res = await fetch('/api/buscar', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ nicho: nicho, regiao: regiao })
  });
  if (!res.ok) { var e = await res.json(); throw new Error(e.error || 'Erro ' + res.status); }
  return res.json();
}

async function buscarCNPJ(cnpj) {
  try {
    var limpo = cnpj.replace(/\D/g, '');
    if (limpo.length !== 14) return null;
    var res = await fetch('https://publica.cnpj.ws/cnpj/' + limpo);
    if (!res.ok) return null;
    var data = await res.json();
    var est = data.estabelecimento;
    if (!est) return null;
    var email = est.email || null;
    var tel = ((est.ddd1 || '') + (est.telefone1 || '')) || ((est.ddd2 || '') + (est.telefone2 || '')) || null;
    return { email: email, telefone: tel };
  } catch(e) { return null; }
}

function renderStats(ops, resI, resT) {
  document.getElementById('sTotal').textContent = ops.length;
  document.getElementById('sFire').textContent = ops.filter(function(o){return o.nicho==='incendio';}).length;
  document.getElementById('sTermo').textContent = ops.filter(function(o){return o.nicho==='termico';}).length;
  document.getElementById('sAlta').textContent = ops.filter(function(o){return o.urgencia==='ALTA';}).length;
  document.getElementById('sContatos').textContent = ops.filter(function(o){return o.contato_email||o.contato_telefone;}).length;
  document.getElementById('cntFire').textContent = allData.incendio.length;
  document.getElementById('cntTermo').textContent = allData.termico.length;
  document.getElementById('statsRow').style.display = 'grid';
  document.getElementById('nichosBar').style.display = 'flex';
  document.getElementById('cenarioFire').innerHTML = '<strong>Cenario Incendio:</strong> ' + (resI.resumo || '');
  document.getElementById('cenarioTermo').innerHTML = '<strong>Cenario Termico:</strong> ' + (resT.resumo || '');
  switchNicho(nichoAtivo);
}

function switchNicho(nicho) {
  nichoAtivo = nicho;
  document.getElementById('tabFire').className = 'nicho-tab' + (nicho === 'incendio' ? ' active-fire' : '');
  document.getElementById('tabTermo').className = 'nicho-tab' + (nicho === 'termico' ? ' active-termo' : '');
  document.getElementById('cenarioFire').className = 'cenario' + (nicho === 'incendio' ? ' visible' : '');
  document.getElementById('cenarioTermo').className = 'cenario' + (nicho === 'termico' ? ' visible' : '');
  document.getElementById('cardsIncendio').className = 'cards-area' + (nicho === 'incendio' ? ' visible' : '');
  document.getElementById('cardsTermico').className = 'cards-area' + (nicho === 'termico' ? ' visible' : '');
}

function renderCards() { renderNicho('incendio', 'cardsIncendio'); renderNicho('termico', 'cardsTermico'); }

function renderNicho(nicho, cid) {
  var ops = allData[nicho];
  var container = document.getElementById(cid);
  if (!ops || !ops.length) { container.innerHTML = '<div class="empty"><div class="ico">&#128269;</div><p>Nenhuma oportunidade neste nicho.</p></div>'; return; }
  var isF = nicho === 'incendio';
  var portes = [
    { key: 'grande', label: 'Grandes Empresas', badge: 'b-grande' },
    { key: 'media', label: 'Medias Empresas', badge: 'b-media-emp' },
    { key: 'pequena', label: 'Pequenas Empresas', badge: 'b-pequena' }
  ];
  var html = ''; var delay = 0;
  for (var pi = 0; pi < portes.length; pi++) {
    var p = portes[pi];
    var grupo = ops.filter(function(o) { return (o.porte || 'grande') === p.key; });
    if (!grupo.length) continue;
    html += '<div class="porte-section"><div class="porte-header"><span class="porte-title">' + p.label + '</span><span class="porte-count">' + grupo.length + ' leads</span></div>';
    for (var gi = 0; gi < grupo.length; gi++) {
      var op = grupo[gi];
      var urg = (op.urgencia || 'MEDIA').toUpperCase();
      var urgKey = urg === 'ALTA' ? 'alta' : (urg === 'MEDIA' || urg === 'MEDIA') ? 'media' : 'baixa';
      var validado = op.cnpj_validado ? '<span class="badge b-ok">CNPJ OK</span>' : '';
      var classeCard = isF ? 'op-card' : 'op-card termico';
      var contatos = '';
      if (op.contato_email || op.contato_telefone) {
        var itens = '';
        if (op.contato_cargo) itens += '<div class="contato-item"><span class="contato-label">Cargo:</span><span class="contato-val">' + op.contato_cargo + '</span></div>';
        if (op.contato_email) itens += '<div class="contato-item"><span class="contato-label">E-mail:</span><span class="contato-val"><a href="mailto:' + op.contato_email + '">' + op.contato_email + '</a></span></div>';
        if (op.contato_telefone) { var tl = String(op.contato_telefone).replace(/\D/g,''); itens += '<div class="contato-item"><span class="contato-label">Telefone:</span><span class="contato-val">' + op.contato_telefone + '</span></div><div class="contato-item"><span class="contato-label">WhatsApp:</span><span class="contato-val"><a href="https://wa.me/55' + tl + '" target="_blank" class="wa-link">Abrir conversa</a></span></div>'; }
        contatos = '<div class="contatos-box"><div class="contatos-title">Dados de Contato</div>' + itens + '</div>';
      } else {
        contatos = '<div class="contatos-box"><div class="contatos-title">Dados de Contato</div><div class="no-contato">Contato nao localizado automaticamente</div><button class="btn-buscar" onclick="buscarGoogle(\'' + (op.empresa_alvo||'').replace(/'/g,"\\'") + '\')">Buscar no Google</button></div>';
      }
      html += '<div class="' + classeCard + '" style="animation-delay:' + (delay * 0.05) + 's">';
      html += '<div class="card-top"><div class="card-title">' + op.titulo + '</div>';
      html += '<div class="badges"><span class="badge ' + (isF ? 'b-fire' : 'b-termo') + '">' + (isF ? 'INCENDIO' : 'TERMICO') + '</span>';
      html += '<span class="badge b-' + urgKey + '">' + urg + '</span>';
      html += '<span class="badge ' + p.badge + '">' + p.label + '</span>' + validado + '</div></div>';
      html += '<div class="emp-linha"><strong>' + op.empresa_alvo + '</strong>' + (op.setor ? ' &middot; ' + op.setor : '') + (op.localizacao ? ' &middot; ' + op.localizacao : '') + '</div>';
      html += '<p class="card-desc">' + op.descricao + '</p>';
      html += '<div class="card-meta">' + (op.valor_estimado ? '<div class="meta-i">Valor: <strong>' + op.valor_estimado + '</strong></div>' : '') + (op.prazo ? '<div class="meta-i">Prazo: <strong>' + op.prazo + '</strong></div>' : '') + '</div>';
      html += contatos;
      html += '<div class="abordagem"><div class="abordagem-title">Como abordar</div><p>' + op.como_abordar + '</p></div>';
      html += '</div>';
      delay++;
    }
    html += '</div>';
  }
  container.innerHTML = html;
}

function buscarGoogle(empresa) {
  window.open('https://www.google.com/search?q=' + encodeURIComponent(empresa + ' contato email telefone'), '_blank');
}
</script>
</body>
</html>
