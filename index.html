<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Prospector — Ritfire</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #ff5c00;
    --accent2: #ff9d00;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --high: #ff4d00;
    --med: #ff9500;
    --low: #00c853;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

  /* LOGIN */
  #login-screen {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    z-index: 100; flex-direction: column; gap: 32px;
  }
  .login-logo { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 4px; text-transform: uppercase; color: var(--accent); }
  .login-box { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 40px 48px; width: 100%; max-width: 380px; display: flex; flex-direction: column; gap: 20px; }
  .login-box h1 { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; }
  .login-box p { font-size: 13px; color: var(--muted); }
  .login-box input { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; width: 100%; outline: none; transition: border-color 0.2s; letter-spacing: 3px; }
  .login-box input:focus { border-color: var(--accent); }
  .login-box input::placeholder { letter-spacing: 0; color: var(--muted); }
  .btn-login { background: var(--accent); color: white; border: none; border-radius: 10px; padding: 14px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px; letter-spacing: 1px; cursor: pointer; transition: opacity 0.2s; }
  .btn-login:hover { opacity: 0.9; }
  .login-error { font-size: 12px; color: var(--high); text-align: center; display: none; }

  /* APP */
  #app { display: none; }
  header { border-bottom: 1px solid var(--border); padding: 20px 40px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: rgba(10,10,15,0.92); backdrop-filter: blur(12px); z-index: 10; }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .logo { font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 800; letter-spacing: 3px; text-transform: uppercase; color: var(--accent); }
  .divider { width: 1px; height: 20px; background: var(--border); }
  .header-title { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 600; color: var(--muted); }
  .header-right { display: flex; align-items: center; gap: 12px; }
  #last-update { font-size: 12px; color: var(--muted); }
  .btn-update { background: transparent; border: 1px solid var(--accent); color: var(--accent); border-radius: 8px; padding: 8px 18px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 12px; letter-spacing: 1px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 8px; }
  .btn-update:hover { background: var(--accent); color: white; }
  .btn-update:disabled { opacity: 0.4; cursor: not-allowed; }
  .spin { animation: spin 1s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  main { max-width: 960px; margin: 0 auto; padding: 48px 24px; }

  .hero { margin-bottom: 40px; animation: fadeUp 0.6s ease both; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  .hero-label { font-size: 11px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; color: var(--accent); margin-bottom: 12px; }
  .hero h2 { font-family: 'Syne', sans-serif; font-size: clamp(28px, 5vw, 42px); font-weight: 800; line-height: 1.1; }
  .hero h2 span { background: linear-gradient(90deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

  /* TABS */
  .tabs { display: flex; gap: 8px; margin-bottom: 32px; flex-wrap: wrap; }
  .tab {
    font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 1px;
    padding: 10px 20px; border-radius: 8px; cursor: pointer; border: 1px solid var(--border);
    color: var(--muted); background: transparent; transition: all 0.2s; text-transform: uppercase;
  }
  .tab:hover { border-color: var(--accent); color: var(--accent); }
  .tab.active { background: var(--accent); border-color: var(--accent); color: white; }
  .tab .count { background: rgba(255,255,255,0.2); border-radius: 20px; padding: 2px 8px; font-size: 10px; margin-left: 6px; }

  /* RESUMO */
  .resumo-box { background: var(--surface); border: 1px solid var(--border); border-left: 3px solid var(--accent); border-radius: 12px; padding: 18px 24px; margin-bottom: 24px; font-size: 14px; color: var(--muted); line-height: 1.7; display: none; }
  .resumo-box strong { color: var(--accent); margin-right: 8px; }

  /* CARDS */
  .cards-container { display: flex; flex-direction: column; gap: 16px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 24px 28px; animation: fadeUp 0.5s ease both; transition: border-color 0.2s, transform 0.2s; position: relative; overflow: hidden; }
  .card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; }
  .card.urgencia-ALTA::before { background: var(--high); }
  .card.urgencia-MÉDIA::before { background: var(--med); }
  .card.urgencia-BAIXA::before { background: var(--low); }
  .card:hover { border-color: #2e2e3e; transform: translateY(-2px); }

  .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; gap: 16px; }
  .card-title { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; color: var(--text); line-height: 1.3; }
  .card-empresa { font-size: 12px; color: var(--accent2); font-weight: 600; margin-bottom: 12px; }
  .badge { flex-shrink: 0; font-family: 'Syne', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 1.5px; padding: 4px 12px; border-radius: 20px; text-transform: uppercase; }
  .badge-ALTA { background: rgba(255,77,0,0.15); color: var(--high); border: 1px solid rgba(255,77,0,0.3); }
  .badge-MÉDIA { background: rgba(255,149,0,0.15); color: var(--med); border: 1px solid rgba(255,149,0,0.3); }
  .badge-BAIXA { background: rgba(0,200,83,0.15); color: var(--low); border: 1px solid rgba(0,200,83,0.3); }

  .card-desc { font-size: 13px; color: var(--muted); line-height: 1.7; margin-bottom: 16px; }
  .card-meta { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 16px; }
  .meta-item { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 5px; }
  .meta-item strong { color: var(--text); }

  .card-info-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 14px; }
  .info-pill { background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 6px; padding: 6px 12px; font-size: 11px; color: var(--muted); }
  .info-pill span { color: var(--text); font-weight: 500; }

  .card-action { background: rgba(255,92,0,0.07); border: 1px solid rgba(255,92,0,0.15); border-radius: 8px; padding: 12px 16px; }
  .action-label { font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); margin-bottom: 5px; }
  .action-text { font-size: 13px; color: #c0c0d0; line-height: 1.6; }

  /* LOADING */
  #loading { text-align: center; padding: 80px 24px; display: none; flex-direction: column; align-items: center; gap: 16px; }
  .loader { width: 40px; height: 40px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  #loading p { font-size: 13px; color: var(--muted); font-family: 'Syne', sans-serif; letter-spacing: 1px; }

  /* TOAST */
  #toast { position: fixed; bottom: 32px; right: 32px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 20px; font-size: 13px; color: var(--text); z-index: 200; opacity: 0; transform: translateY(10px); transition: all 0.3s; pointer-events: none; max-width: 320px; }
  #toast.show { opacity: 1; transform: translateY(0); }
  #toast.success { border-color: var(--low); }
  #toast.error { border-color: var(--high); }

  footer { text-align: center; padding: 40px 24px; font-size: 11px; color: var(--muted); letter-spacing: 1px; border-top: 1px solid var(--border); margin-top: 40px; }

  @media (max-width: 600px) {
    header { padding: 16px 20px; }
    .header-title { display: none; }
    main { padding: 32px 16px; }
    .card { padding: 18px 20px; }
  }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-logo">⚡ Ritfire</div>
  <div class="login-box">
    <h1>AI Prospector</h1>
    <p>Acesse com sua senha para ver as oportunidades do dia.</p>
    <input type="password" id="senha-input" placeholder="Digite sua senha" onkeydown="if(event.key==='Enter')login()">
    <button class="btn-login" onclick="login()">ENTRAR</button>
    <div class="login-error" id="login-error">Senha incorreta. Tente novamente.</div>
  </div>
</div>

<div id="app">
  <header>
    <div class="header-left">
      <span class="logo">⚡ Ritfire</span>
      <div class="divider"></div>
      <span class="header-title">AI Prospector</span>
    </div>
    <div class="header-right">
      <span id="last-update"></span>
      <button class="btn-update" id="btn-update" onclick="triggerUpdate()">
        <span id="btn-icon">↻</span> ATUALIZAR
      </button>
    </div>
  </header>

  <main>
    <div class="hero">
      <div class="hero-label">📡 Inteligência comercial</div>
      <h2>Oportunidades de <span>negócio</span><br>para hoje</h2>
    </div>

    <div class="tabs" id="tabs"></div>

    <div id="resumo-atual" class="resumo-box"></div>

    <div id="loading">
      <div class="loader"></div>
      <p>Buscando oportunidades...</p>
    </div>

    <div id="cards-container" class="cards-container"></div>
  </main>

  <footer>🤖 AI Prospector · Powered by Groq + GitHub Actions</footer>
</div>

<div id="toast"></div>

<script>
  const SENHA = "ritfire2026";
  const OWNER = "camimogueirasm-spec";
  const REPO  = "prospector-ritfire";

  let allData = null;
  let categoriaAtiva = "obra";

  const categoriaConfig = {
    obra:      { label: "🏗 Obras",      emoji: "🏗" },
    licitacao: { label: "📋 Licitações", emoji: "📋" },
    lead:      { label: "🎯 Leads",      emoji: "🎯" }
  };

  function login() {
    const val = document.getElementById('senha-input').value;
    if (val === SENHA) {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      loadData();
    } else {
      document.getElementById('login-error').style.display = 'block';
      document.getElementById('senha-input').value = '';
      document.getElementById('senha-input').focus();
    }
  }

  async function loadData() {
    document.getElementById('loading').style.display = 'flex';
    try {
      const res = await fetch('data.json?t=' + Date.now());
      if (!res.ok) throw new Error('sem dados');
      allData = await res.json();
      renderTabs();
      renderCategoria(categoriaAtiva);
      if (allData.gerado_em) {
        document.getElementById('last-update').textContent = 'Atualizado: ' + allData.gerado_em;
      }
    } catch (e) {
      document.getElementById('cards-container').innerHTML =
        '<p style="color:var(--muted);text-align:center;padding:60px 0;font-size:13px;">Nenhum dado disponível ainda.<br>Clique em <strong style="color:var(--accent)">ATUALIZAR</strong> para gerar oportunidades.</p>';
    } finally {
      document.getElementById('loading').style.display = 'none';
    }
  }

  function renderTabs() {
    const tabsEl = document.getElementById('tabs');
    tabsEl.innerHTML = '';
    const categorias = allData.categorias || {};
    Object.entries(categoriaConfig).forEach(([key, cfg]) => {
      const count = (categorias[key]?.oportunidades || []).length;
      const tab = document.createElement('button');
      tab.className = 'tab' + (key === categoriaAtiva ? ' active' : '');
      tab.innerHTML = `${cfg.label} <span class="count">${count}</span>`;
      tab.onclick = () => {
        categoriaAtiva = key;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        renderCategoria(key);
      };
      tabsEl.appendChild(tab);
    });
  }

  function renderCategoria(categoria) {
    const categorias = allData?.categorias || {};
    const data = categorias[categoria] || {};
    const ops = data.oportunidades || [];

    // Resumo
    const resumoEl = document.getElementById('resumo-atual');
    if (data.resumo) {
      resumoEl.innerHTML = '<strong>📊 Cenário</strong>' + data.resumo;
      resumoEl.style.display = 'block';
    } else {
      resumoEl.style.display = 'none';
    }

    const container = document.getElementById('cards-container');
    container.innerHTML = '';

    if (ops.length === 0) {
      container.innerHTML = '<p style="color:var(--muted);text-align:center;padding:60px 0;">Nenhuma oportunidade nesta categoria.</p>';
      return;
    }

    ops.forEach((op, i) => {
      const urg = op.urgencia || 'MÉDIA';
      const urgCor = { ALTA: 'var(--high)', MÉDIA: 'var(--med)', BAIXA: 'var(--low)' }[urg];
      const card = document.createElement('div');
      card.className = `card urgencia-${urg}`;
      card.style.animationDelay = `${i * 0.06}s`;
      card.innerHTML = `
        <div class="card-header">
          <div class="card-title">${categoriaConfig[categoria]?.emoji || '📌'} ${op.titulo || ''}</div>
          <span class="badge badge-${urg}">${urg}</span>
        </div>
        ${op.empresa ? `<div class="card-empresa">🏢 ${op.empresa}</div>` : ''}
        <p class="card-desc">${op.descricao || ''}</p>
        <div class="card-meta">
          <div class="meta-item">📍 <strong>${op.localizacao || ''}</strong></div>
          <div class="meta-item">💰 <strong>${op.valor_estimado || ''}</strong></div>
          <div class="meta-item">🗓 <strong>${op.prazo || ''}</strong></div>
        </div>
        <div class="card-info-row">
          ${op.fonte ? `<div class="info-pill">🔗 Fonte: <span>${op.fonte}</span></div>` : ''}
          ${op.contato_ideal ? `<div class="info-pill">👤 Contato: <span>${op.contato_ideal}</span></div>` : ''}
        </div>
        <div class="card-action">
          <div class="action-label">💡 Como abordar</div>
          <div class="action-text">${op.como_abordar || ''}</div>
        </div>
      `;
      container.appendChild(card);
    });
  }

  async function triggerUpdate() {
    const ghToken = allData?.gh_token || '';
    if (!ghToken) {
      showToast('⚠️ Token do GitHub não configurado.', 'error');
      return;
    }

    const btn = document.getElementById('btn-update');
    const icon = document.getElementById('btn-icon');
    btn.disabled = true;
    icon.className = 'spin';
    icon.textContent = '↻';

    try {
      const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/actions/workflows/prospector-workflow.yml/dispatches`, {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${ghToken}`,
          'Accept': 'application/vnd.github.v3+json',
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ ref: 'main' })
      });

      if (res.status === 204) {
        showToast('✅ Atualizando! Aguarde ~60s e recarregue a página.', 'success');
        setTimeout(() => loadData(), 65000);
      } else {
        throw new Error('status ' + res.status);
      }
    } catch(e) {
      showToast('❌ Erro: ' + e.message, 'error');
    } finally {
      btn.disabled = false;
      icon.className = '';
      icon.textContent = '↻';
    }
  }

  function showToast(msg, type='') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'show ' + type;
    setTimeout(() => t.className = '', 5000);
  }
</script>
</body>
</html>
