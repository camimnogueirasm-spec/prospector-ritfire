<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ritfire — AI Prospector</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --card: #16161f;
    --border: #2a2a3d;
    --fire: #ff4d00;
    --fire2: #ff9500;
    --blue: #1976d2;
    --blue2: #42a5f5;
    --green: #00e676;
    --text: #e8e8f0;
    --muted: #6b6b8a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(255,77,0,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,77,0,0.02) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none; z-index: 0;
  }

  /* NAVBAR */
  nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(10,10,15,0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex; align-items: center; justify-content: space-between;
    height: 56px;
  }

  .nav-logo {
    display: flex; align-items: center; gap: 10px;
    font-weight: 800; font-size: 18px; letter-spacing: -0.5px;
  }

  .nav-logo .icon {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, var(--fire), var(--fire2));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }

  .nav-right {
    display: flex; align-items: center; gap: 12px;
  }

  .last-update {
    font-family: 'Space Mono', monospace;
    font-size: 11px; color: var(--muted);
  }

  .btn-update {
    display: flex; align-items: center; gap: 6px;
    background: linear-gradient(135deg, var(--fire), var(--fire2));
    color: white; border: none; border-radius: 8px;
    padding: 8px 16px;
    font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700;
    cursor: pointer; transition: opacity 0.2s;
  }

  .btn-update:hover { opacity: 0.85; }
  .btn-update:disabled { opacity: 0.4; cursor: not-allowed; }

  /* MAIN */
  .main { max-width: 1000px; margin: 0 auto; padding: 28px 20px 60px; position: relative; z-index: 1; }

  /* STATS */
  .stats-row {
    display: grid; grid-template-columns: repeat(5, 1fr);
    gap: 10px; margin-bottom: 24px;
  }

  @media(max-width:640px){ .stats-row{ grid-template-columns: repeat(2,1fr); } }

  .stat {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px; text-align: center;
  }

  .stat-n { font-size: 26px; font-weight: 800; }
  .stat-l { font-size: 10px; color: var(--muted); font-family: 'Space Mono', monospace; margin-top: 3px; letter-spacing: 1px; }

  /* NICHOS TABS */
  .nichos {
    display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;
  }

  .nicho-tab {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 20px; border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--card);
    font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700;
    cursor: pointer; transition: all 0.2s;
    color: var(--muted);
  }

  .nicho-tab.active-fire {
    background: rgba(255,77,0,0.12);
    border-color: var(--fire);
    color: var(--fire2);
  }

  .nicho-tab.active-termo {
    background: rgba(25,118,210,0.12);
    border-color: var(--blue);
    color: var(--blue2);
  }

  .nicho-tab .count {
    background: var(--border); color: var(--text);
    border-radius: 20px; padding: 2px 8px;
    font-size: 11px; font-family: 'Space Mono', monospace;
  }

  .nicho-tab.active-fire .count { background: var(--fire); }
  .nicho-tab.active-termo .count { background: var(--blue); }

  /* CENARIO */
  .cenario {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 18px;
    margin-bottom: 20px;
    font-size: 13px; color: #c0c0d8; line-height: 1.6;
    display: none;
  }

  .cenario.visible { display: block; }
  .cenario strong { color: var(--fire2); }

  /* CARDS */
  .cards-area { display: none; }
  .cards-area.visible { display: block; }

  .op-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 22px; margin-bottom: 14px;
    transition: border-color 0.2s;
    animation: up 0.3s ease forwards; opacity: 0;
  }

  @keyframes up {
    from { opacity:0; transform:translateY(8px); }
    to { opacity:1; transform:translateY(0); }
  }

  .op-card:hover { border-color: rgba(255,77,0,0.3); }
  .op-card.termico:hover { border-color: rgba(25,118,210,0.3); }

  .op-card { border-left: 4px solid var(--fire); }
  .op-card.termico { border-left: 4px solid var(--blue); }

  .card-top {
    display: flex; align-items: flex-start;
    justify-content: space-between; gap: 10px;
    margin-bottom: 8px; flex-wrap: wrap;
  }

  .card-title { font-size: 15px; font-weight: 700; flex: 1; line-height: 1.3; }

  .badges { display: flex; gap: 6px; flex-wrap: wrap; }

  .badge {
    padding: 3px 9px; border-radius: 20px;
    font-size: 10px; font-weight: 700;
    font-family: 'Space Mono', monospace;
    text-transform: uppercase; white-space: nowrap;
  }

  .badge-fire { background: rgba(255,77,0,0.12); color: var(--fire2); border: 1px solid rgba(255,77,0,0.2); }
  .badge-termo { background: rgba(25,118,210,0.12); color: var(--blue2); border: 1px solid rgba(25,118,210,0.2); }
  .badge-alta { background: rgba(229,57,53,0.15); color: #ef9a9a; border: 1px solid rgba(229,57,53,0.2); }
  .badge-media { background: rgba(255,149,0,0.12); color: var(--fire2); border: 1px solid rgba(255,149,0,0.2); }
  .badge-baixa { background: rgba(0,230,118,0.08); color: var(--green); border: 1px solid rgba(0,230,118,0.18); }
  .badge-ok { background: rgba(0,200,83,0.1); color: #69f0ae; border: 1px solid rgba(0,200,83,0.2); }

  .empresa-linha {
    font-size: 13px; color: var(--muted);
    margin-bottom: 10px;
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  }

  .empresa-linha strong { color: var(--text); }

  .card-desc {
    font-size: 13px; color: #b0b0c8;
    line-height: 1.6; margin-bottom: 14px;
  }

  .card-meta {
    display: flex; gap: 16px; flex-wrap: wrap;
    margin-bottom: 14px;
  }

  .meta-i {
    font-size: 11px; color: var(--muted);
    font-family: 'Space Mono', monospace;
    display: flex; align-items: center; gap: 4px;
  }

  .meta-i strong { color: var(--text); }

  /* CONTATOS */
  .contatos-box {
    background: #0d0d18; border: 1px solid #1e1e35;
    border-radius: 8px; padding: 14px;
    margin-bottom: 14px;
  }

  .contatos-title {
    font-size: 10px; font-weight: 700;
    letter-spacing: 2px; text-transform: uppercase;
    color: var(--muted); margin-bottom: 10px;
  }

  .contatos-grid {
    display: flex; flex-direction: column; gap: 7px;
  }

  .contato-item {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px;
  }

  .contato-label { color: var(--muted); min-width: 70px; font-size: 12px; }

  .contato-val { color: var(--text); font-weight: 600; }

  .contato-val a { color: var(--fire2); text-decoration: none; }
  .contato-val a:hover { text-decoration: underline; }

  .contato-val .wa-link {
    color: #25d366; display: inline-flex; align-items: center; gap: 4px;
  }

  .no-contato {
    font-size: 12px; color: var(--muted); font-style: italic;
    display: flex; align-items: center; gap: 6px;
  }

  .btn-buscar {
    display: inline-flex; align-items: center; gap: 5px;
    background: rgba(255,77,0,0.1); border: 1px solid rgba(255,77,0,0.2);
    color: var(--fire2); border-radius: 6px;
    padding: 5px 12px; font-size: 11px; font-weight: 700;
    cursor: pointer; transition: all 0.2s; margin-top: 6px;
    font-family: 'Syne', sans-serif;
  }

  .btn-buscar:hover { background: rgba(255,77,0,0.2); }
  .btn-buscar:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ABORDAGEM */
  .abordagem {
    border-left: 3px solid var(--fire);
    padding: 10px 14px; border-radius: 0 8px 8px 0;
    background: rgba(255,77,0,0.04);
  }

  .op-card.termico .abordagem { border-left-color: var(--blue); }

  .abordagem-title {
    font-size: 10px; font-weight: 700;
    letter-spacing: 2px; text-transform: uppercase;
    color: var(--fire2); margin-bottom: 5px;
  }

  .op-card.termico .abordagem-title { color: var(--blue2); }

  .abordagem p { font-size: 13px; color: #c0b090; line-height: 1.5; }

  /* LOADING */
  .loading-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(10,10,15,0.9);
    z-index: 200; flex-direction: column;
    align-items: center; justify-content: center; gap: 16px;
  }

  .loading-overlay.visible { display: flex; }

  .spinner {
    width: 50px; height: 50px;
    border: 3px solid var(--border); border-top-color: var(--fire);
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text { font-size: 14px; color: var(--muted); }
  .loading-step {
    font-family: 'Space Mono', monospace;
    font-size: 12px; color: var(--fire);
    min-height: 18px;
  }

  /* EMPTY */
  .empty {
    text-align: center; padding: 60px 20px; color: var(--muted);
  }

  .empty .ico { font-size: 48px; margin-bottom: 14px; opacity: 0.3; }
  .empty p { font-size: 14px; }

  /* ERROR */
  .error-box {
    background: rgba(229,57,53,0.08);
    border: 1px solid rgba(229,57,53,0.2);
    border-radius: 10px; padding: 16px;
    color: #ef9a9a; font-size: 13px; line-height: 1.6;
    margin-bottom: 20px; display: none;
  }

  .error-box.visible { display: block; }

  /* CONFIG PANEL */
  .config-panel {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 20px;
    margin-bottom: 24px;
  }

  .config-title {
    font-size: 11px; font-weight: 700;
    letter-spacing: 3px; text-transform: uppercase;
    color: var(--fire); margin-bottom: 16px;
  }

  .config-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  @media(max-width:580px){ .config-grid{ grid-template-columns: 1fr; } }

  .cfg-field { display: flex; flex-direction: column; gap: 6px; }
  .cfg-field label {
    font-size: 10px; font-weight: 700;
    letter-spacing: 2px; text-transform: uppercase; color: var(--muted);
  }

  .cfg-field input {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 7px; padding: 10px 12px;
    color: var(--text); font-family: 'Syne', sans-serif; font-size: 13px;
    outline: none; transition: border-color 0.2s;
  }

  .cfg-field input:focus { border-color: var(--fire); }
</style>
</head>
<body>

<!-- NAVBAR -->
<nav>
  <div class="nav-logo">
    <div class="icon">⚡</div>
    <span>RITFIRE</span>
    <span style="color:var(--muted);font-weight:400;font-size:14px;margin-left:4px;">| AI Prospector</span>
  </div>
  <div class="nav-right">
    <span class="last-update" id="lastUpdate">Nunca atualizado</span>
    <button class="btn-update" id="btnUpdate" onclick="buscar()">
      ↻ ATUALIZAR
    </button>
  </div>
</nav>

<!-- LOADING -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text">Varrendo o mercado com IA...</div>
  <div class="loading-step" id="loadingStep">Iniciando...</div>
</div>

<div class="main">

  <!-- CONFIG -->
  <div class="config-panel">
    <div class="config-title">⚙ Configuração</div>
    <div class="config-grid">
      <div class="cfg-field">
        <label>⚡ Groq API Key (gratuita)</label>
        <input type="password" id="apiKey" placeholder="gsk_...">
      </div>
      <div class="cfg-field">
        <label>Região de Busca</label>
        <input type="text" id="regiao" value="Brasil" placeholder="Ex: Brasil, São Paulo...">
      </div>
    </div>
  </div>

  <!-- ERROR -->
  <div class="error-box" id="errorBox"></div>

  <!-- STATS -->
  <div class="stats-row" id="statsRow" style="display:none">
    <div class="stat">
      <div class="stat-n" id="sTotal" style="color:var(--text)">0</div>
      <div class="stat-l">TOTAL</div>
    </div>
    <div class="stat">
      <div class="stat-n" id="sFire" style="color:var(--fire)">0</div>
      <div class="stat-l">INCÊNDIO</div>
    </div>
    <div class="stat">
      <div class="stat-n" id="sTermo" style="color:var(--blue2)">0</div>
      <div class="stat-l">TÉRMICO</div>
    </div>
    <div class="stat">
      <div class="stat-n" id="sAlta" style="color:#ef9a9a">0</div>
      <div class="stat-l">URGENTE</div>
    </div>
    <div class="stat">
      <div class="stat-n" id="sContatos" style="color:var(--green)">0</div>
      <div class="stat-l">COM CONTATO</div>
    </div>
  </div>

  <!-- NICHOS TABS -->
  <div class="nichos" id="nichosBar" style="display:none">
    <button class="nicho-tab active-fire" id="tabFire" onclick="switchNicho('incendio')">
      🔥 Proteção contra Incêndio
      <span class="count" id="countFire">0</span>
    </button>
    <button class="nicho-tab" id="tabTermo" onclick="switchNicho('termico')">
      🌡 Isolamento Térmico
      <span class="count" id="countTermo">0</span>
    </button>
  </div>

  <!-- CENARIOS -->
  <div class="cenario" id="cenarioFire"></div>
  <div class="cenario" id="cenarioTermo"></div>

  <!-- CARDS -->
  <div class="cards-area" id="cardsIncendio"></div>
  <div class="cards-area" id="cardsTermico"></div>

  <!-- EMPTY -->
  <div class="empty" id="emptyState">
    <div class="ico">🎯</div>
    <p>Cole sua Groq API Key acima e clique em <strong>Atualizar</strong> para buscar oportunidades.</p>
    <p style="margin-top:8px;font-size:12px;">Chave gratuita em <a href="https://console.groq.com" target="_blank" style="color:var(--fire2)">console.groq.com</a></p>
  </div>

</div>

<script>
let allData = { incendio: [], termico: [] };
let nichoAtivo = 'incendio';

const loadingSteps = [
  "Conectando ao Groq...",
  "Analisando proteção passiva contra incêndio...",
  "Identificando obras e licitações...",
  "Buscando oportunidades de isolamento térmico...",
  "Consultando CNPJ.ws para contatos reais...",
  "Validando dados de contato...",
  "Montando relatório final..."
];

async function buscar() {
  const apiKey = document.getElementById('apiKey').value.trim();
  const regiao = document.getElementById('regiao').value.trim() || 'Brasil';

  if (!apiKey) {
    showError('Cole sua Groq API Key no campo acima. Obtenha gratuitamente em console.groq.com');
    return;
  }

  const btn = document.getElementById('btnUpdate');
  btn.disabled = true;
  btn.textContent = '⏳ Buscando...';

  document.getElementById('loadingOverlay').classList.add('visible');
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('errorBox').classList.remove('visible');

  let si = 0;
  const iv = setInterval(() => {
    const el = document.getElementById('loadingStep');
    if (el && si < loadingSteps.length) el.textContent = loadingSteps[si++];
  }, 1000);

  try {
    const result = await chamarGroq(apiKey, regiao);
    clearInterval(iv);

    const ops = result.oportunidades || [];

    // Enriquecer com CNPJ.ws
    document.getElementById('loadingStep').textContent = 'Buscando contatos via CNPJ.ws...';
    for (let op of ops) {
      if (op.cnpj) {
        const dados = await buscarCNPJ(op.cnpj);
        if (dados) {
          if (dados.email) op.contato_email = dados.email;
          if (dados.telefone) op.contato_telefone = dados.telefone;
          op.cnpj_validado = true;
        }
      }
    }

    allData.incendio = ops.filter(o => o.nicho === 'incendio');
    allData.termico = ops.filter(o => o.nicho === 'termico');

    renderStats(ops, result);
    renderCards();
    document.getElementById('lastUpdate').textContent = `Atualizado: ${new Date().toLocaleString('pt-BR')}`;

  } catch (err) {
    clearInterval(iv);
    showError(`Erro: ${err.message}`);
    document.getElementById('emptyState').style.display = 'block';
  } finally {
    document.getElementById('loadingOverlay').classList.remove('visible');
    btn.disabled = false;
    btn.textContent = '↻ ATUALIZAR';
  }
}

async function chamarGroq(apiKey, regiao) {
  const setores = [
    "Siderúrgicas","Metalúrgicas","Construção Civil","Offshore","Empresas Navais",
    "Fundições","Indústrias de Vidro","Indústrias Cerâmicas","Cimenteiras",
    "Fabricantes de Forjas","Petroquímicas","Refinarias","Usinas Termoelétricas",
    "Indústrias de Alumínio","Fabricantes de Fornos Industriais",
    "Empresas de Manutenção de Fornos","Fabricantes de Caldeiras",
    "Isolamento Térmico Industrial","Automação Industrial",
    "Montadoras de Automóveis","Papel e Celulose","Hospitais","Mineração","Aeroportos"
  ].join(", ");

  const prompt = `Você é especialista sênior em prospecção B2B para indústrias brasileiras.

A empresa RITFIRE atua em dois nichos:
1. PROTEÇÃO PASSIVA CONTRA INCÊNDIO (principal): revestimentos intumescentes, selantes corta-fogo, barreiras, portas corta-fogo, compartimentação.
2. ISOLAMENTO TÉRMICO (secundário): materiais e serviços para processos industriais de alta temperatura.

Setores-alvo: ${setores}
Região: ${regiao}

Identifique 8 oportunidades REAIS no Brasil (5 de incêndio + 3 de isolamento térmico).
Inclua CNPJ real quando souber.

JSON APENAS (sem markdown):
{
  "resumo_incendio": "Cenário atual de proteção passiva no Brasil em 1 frase",
  "resumo_termico": "Cenário atual de isolamento térmico no Brasil em 1 frase",
  "oportunidades": [
    {
      "nicho": "incendio|termico",
      "titulo": "Título",
      "empresa_alvo": "Nome real da empresa",
      "cnpj": "14 dígitos ou null",
      "setor": "Setor",
      "descricao": "2-3 frases com contexto e necessidade específica",
      "localizacao": "Cidade/Estado",
      "valor_estimado": "Valor em R$",
      "prazo": "Prazo ou fase",
      "urgencia": "ALTA|MÉDIA|BAIXA",
      "contato_cargo": "Cargo a contatar",
      "contato_email": "email@empresa.com.br",
      "contato_telefone": "DDD + número",
      "como_abordar": "Ação específica com cargo, canal e mensagem-chave"
    }
  ]
}`;

  const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${apiKey}`
    },
    body: JSON.stringify({
      model: 'llama-3.3-70b-versatile',
      max_tokens: 3500,
      temperature: 0.7,
      messages: [
        { role: 'system', content: 'Responda APENAS com JSON válido, sem markdown.' },
        { role: 'user', content: prompt }
      ]
    })
  });

  if (!res.ok) {
    const err = await res.json();
    throw new Error(err.error?.message || `Erro ${res.status}`);
  }

  const data = await res.json();
  const text = data.choices[0].message.content;
  const match = text.match(/\{[\s\S]*\}/);
  if (!match) throw new Error('Resposta inválida da IA.');
  return JSON.parse(match[0]);
}

async function buscarCNPJ(cnpj) {
  try {
    const limpo = cnpj.replace(/\D/g, '');
    if (limpo.length !== 14) return null;
    const res = await fetch(`https://publica.cnpj.ws/cnpj/${limpo}`);
    if (!res.ok) return null;
    const data = await res.json();
    const est = data.estabelecimento;
    if (!est) return null;
    const email = est.email || null;
    const tel = (est.ddd1 || '') + (est.telefone1 || '') || (est.ddd2 || '') + (est.telefone2 || '') || null;
    return { email, telefone: tel };
  } catch { return null; }
}

function renderStats(ops, result) {
  const fire = ops.filter(o => o.nicho === 'incendio').length;
  const termo = ops.filter(o => o.nicho === 'termico').length;
  const alta = ops.filter(o => o.urgencia === 'ALTA').length;
  const comContato = ops.filter(o => o.contato_email || o.contato_telefone).length;

  document.getElementById('sTotal').textContent = ops.length;
  document.getElementById('sFire').textContent = fire;
  document.getElementById('sTermo').textContent = termo;
  document.getElementById('sAlta').textContent = alta;
  document.getElementById('sContatos').textContent = comContato;
  document.getElementById('countFire').textContent = fire;
  document.getElementById('countTermo').textContent = termo;

  document.getElementById('statsRow').style.display = 'grid';
  document.getElementById('nichosBar').style.display = 'flex';

  // Cenários
  const cfEl = document.getElementById('cenarioFire');
  cfEl.innerHTML = `<strong>📊 Cenário:</strong> ${result.resumo_incendio || ''}`;

  const ctEl = document.getElementById('cenarioTermo');
  ctEl.innerHTML = `<strong>📊 Cenário:</strong> ${result.resumo_termico || ''}`;

  switchNicho(nichoAtivo);
}

function switchNicho(nicho) {
  nichoAtivo = nicho;

  document.getElementById('tabFire').className = 'nicho-tab' + (nicho === 'incendio' ? ' active-fire' : '');
  document.getElementById('tabTermo').className = 'nicho-tab' + (nicho === 'termico' ? ' active-termo' : '');

  document.getElementById('cenarioFire').className = 'cenario' + (nicho === 'incendio' ? ' visible' : '');
  document.getElementById('cenarioTermo').className = 'cenario' + (nicho === 'termico' ? ' visible' : '');

  document.getElementById('cardsIncendio').className = 'cards-area' + (nicho === 'incendio' ? ' visible' : '');
  document.getElementById('cardsTermico').className = 'cards-area' + (nicho === 'termico' ? ' visible' : '');

  renderCards();
}

function renderCards() {
  renderNicho('incendio', 'cardsIncendio');
  renderNicho('termico', 'cardsTermico');
}

function renderNicho(nicho, containerId) {
  const ops = allData[nicho];
  const container = document.getElementById(containerId);
  if (!ops || ops.length === 0) {
    container.innerHTML = '<div class="empty"><div class="ico">🔍</div><p>Nenhuma oportunidade neste nicho.</p></div>';
    return;
  }

  const corNicho = nicho === 'incendio' ? 'var(--fire2)' : 'var(--blue2)';
  const labelNicho = nicho === 'incendio' ? '🔥 INCÊNDIO' : '🌡 TÉRMICO';
  const classeCard = nicho === 'termico' ? 'op-card termico' : 'op-card';

  container.innerHTML = ops.map((op, i) => {
    const badgeUrg = `badge-${(op.urgencia || 'MÉDIA').toLowerCase().replace('é','e').replace('Ã','a')}`;
    const validado = op.cnpj_validado ? '<span class="badge badge-ok">✅ CNPJ validado</span>' : '';

    // Contatos
    let contatosHtml = '';
    const temContato = op.contato_email || op.contato_telefone;

    if (temContato) {
      let itens = '';
      if (op.contato_cargo) {
        itens += `<div class="contato-item"><span class="contato-label">👤 Cargo:</span><span class="contato-val">${op.contato_cargo}</span></div>`;
      }
      if (op.contato_email) {
        itens += `<div class="contato-item"><span class="contato-label">📧 E-mail:</span><span class="contato-val"><a href="mailto:${op.contato_email}">${op.contato_email}</a></span></div>`;
      }
      if (op.contato_telefone) {
        const telLimpo = op.contato_telefone.replace(/\D/g,'');
        itens += `<div class="contato-item"><span class="contato-label">📞 Telefone:</span><span class="contato-val">${op.contato_telefone}</span></div>`;
        itens += `<div class="contato-item"><span class="contato-label">💬 WhatsApp:</span><span class="contato-val"><a href="https://wa.me/55${telLimpo}" target="_blank" class="wa-link">💬 Abrir conversa →</a></span></div>`;
      }
      contatosHtml = `<div class="contatos-box"><div class="contatos-title">📬 Dados de Contato</div><div class="contatos-grid">${itens}</div></div>`;
    } else {
      contatosHtml = `<div class="contatos-box">
        <div class="contatos-title">📬 Dados de Contato</div>
        <div class="no-contato">⚠️ Contato não localizado automaticamente</div>
        <button class="btn-buscar" onclick="buscarContatoManual(this, '${(op.empresa_alvo||'').replace(/'/g,"\\'")}', '${op.cnpj||''}')">🔍 Buscar contato agora</button>
      </div>`;
    }

    return `
    <div class="${classeCard}" style="animation-delay:${i*0.06}s">
      <div class="card-top">
        <div class="card-title">${op.titulo}</div>
        <div class="badges">
          <span class="badge badge-${nicho === 'incendio' ? 'fire' : 'termo'}">${labelNicho}</span>
          <span class="badge ${badgeUrg}">${op.urgencia || 'MÉDIA'}</span>
          ${validado}
        </div>
      </div>
      <div class="empresa-linha">
        🏭 <strong>${op.empresa_alvo}</strong>
        ${op.setor ? `· <span>${op.setor}</span>` : ''}
        ${op.localizacao ? `· 📍 ${op.localizacao}` : ''}
      </div>
      <p class="card-desc">${op.descricao}</p>
      <div class="card-meta">
        ${op.valor_estimado ? `<div class="meta-i">💰 <strong>${op.valor_estimado}</strong></div>` : ''}
        ${op.prazo ? `<div class="meta-i">🗓 <strong>${op.prazo}</strong></div>` : ''}
      </div>
      ${contatosHtml}
      <div class="abordagem">
        <div class="abordagem-title">💡 Como abordar</div>
        <p>${op.como_abordar}</p>
      </div>
    </div>`;
  }).join('');
}

async function buscarContatoManual(btn, empresa, cnpj) {
  btn.disabled = true;
  btn.textContent = '⏳ Buscando...';

  try {
    let achei = false;
    if (cnpj) {
      const dados = await buscarCNPJ(cnpj);
      if (dados && (dados.email || dados.telefone)) {
        const box = btn.closest('.contatos-box');
        let itens = '';
        if (dados.email) itens += `<div class="contato-item"><span class="contato-label">📧 E-mail:</span><span class="contato-val"><a href="mailto:${dados.email}">${dados.email}</a></span></div>`;
        if (dados.telefone) {
          const tl = dados.telefone.replace(/\D/g,'');
          itens += `<div class="contato-item"><span class="contato-label">📞 Telefone:</span><span class="contato-val">${dados.telefone}</span></div>`;
          itens += `<div class="contato-item"><span class="contato-label">💬 WhatsApp:</span><span class="contato-val"><a href="https://wa.me/55${tl}" target="_blank" class="wa-link">💬 Abrir conversa →</a></span></div>`;
        }
        box.innerHTML = `<div class="contatos-title">📬 Dados de Contato <span class="badge badge-ok" style="margin-left:6px;">✅ CNPJ.ws</span></div><div class="contatos-grid">${itens}</div>`;
        achei = true;
      }
    }

    if (!achei) {
      btn.textContent = '❌ Não encontrado — buscar no site';
      btn.disabled = false;
      btn.onclick = () => window.open(`https://www.google.com/search?q=${encodeURIComponent(empresa + ' contato email telefone site:br')}`, '_blank');
    }
  } catch {
    btn.textContent = '❌ Erro — tentar novamente';
    btn.disabled = false;
  }
}

function showError(msg) {
  const el = document.getElementById('errorBox');
  el.textContent = '⚠️ ' + msg;
  el.classList.add('visible');
}
</script>
</body>
</html>
