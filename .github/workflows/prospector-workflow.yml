name: AI Prospector Ritfire

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Injetar API Key no HTML
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          sed -i "s|GROQ_KEY_PLACEHOLDER|${GROQ_API_KEY}|g" index.html

      - name: Commit e push do HTML com chave
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "Deploy: injetar chave"
          git push origin main
